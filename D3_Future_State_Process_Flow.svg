<svg viewBox="0 0 1100 850" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1F4E79"/>
    </marker>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1F4E79"/>
      <stop offset="100%" style="stop-color:#2E75B6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="850" fill="#FAFBFD"/>

  <!-- Title Block -->
  <rect x="0" y="0" width="1100" height="70" fill="url(#headerGrad)"/>
  <text x="550" y="32" text-anchor="middle" fill="white" font-size="18" font-weight="bold">FUTURE-STATE PROCESS FLOW</text>
  <text x="550" y="55" text-anchor="middle" fill="#B8D4E8" font-size="13">Data-Driven Footfall &amp; Staffing Decision Framework for Mid-Size Retailers</text>

  <!-- Legend -->
  <rect x="30" y="85" width="120" height="25" rx="12" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="40" y="102" font-size="10" fill="#2E7D32">Start / End</text>
  <rect x="165" y="85" width="120" height="25" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1"/>
  <text x="175" y="102" font-size="10" fill="#1565C0">Process Step</text>
  <polygon points="370,85 400,97.5 370,110 340,97.5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="410" y="102" font-size="10" fill="#F57F17">Decision</text>
  <rect x="500" y="85" width="120" height="25" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="510" y="102" font-size="10" fill="#2E7D32">Improvement</text>
  <rect x="640" y="85" width="120" height="25" rx="4" fill="#EDE7F6" stroke="#5E35B1" stroke-width="1"/>
  <text x="650" y="102" font-size="10" fill="#5E35B1">Dashboard / Data</text>
  <rect x="780" y="85" width="150" height="25" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="790" y="102" font-size="10" fill="#E65100">Automated / Scheduled</text>

  <!-- Swimlanes -->
  <rect x="30" y="125" width="1040" height="100" fill="#F0F4F8" stroke="#CCCCCC" stroke-width="1"/>
  <text x="45" y="178" font-size="10" font-weight="bold" fill="#1F4E79" transform="rotate(-90 45 178)">Data Layer</text>

  <rect x="30" y="225" width="1040" height="110" fill="white" stroke="#CCCCCC" stroke-width="1"/>
  <text x="45" y="285" font-size="10" font-weight="bold" fill="#1F4E79" transform="rotate(-90 45 285)">Store Mgr</text>

  <rect x="30" y="335" width="1040" height="110" fill="#F0F4F8" stroke="#CCCCCC" stroke-width="1"/>
  <text x="45" y="395" font-size="10" font-weight="bold" fill="#1F4E79" transform="rotate(-90 45 395)">Area Mgr</text>

  <rect x="30" y="445" width="1040" height="110" fill="white" stroke="#CCCCCC" stroke-width="1"/>
  <text x="45" y="505" font-size="10" font-weight="bold" fill="#1F4E79" transform="rotate(-90 45 505)">Head Office</text>

  <rect x="30" y="555" width="1040" height="90" fill="#F0F4F8" stroke="#CCCCCC" stroke-width="1"/>
  <text x="45" y="605" font-size="10" font-weight="bold" fill="#1F4E79" transform="rotate(-90 45 605)">Finance</text>

  <!-- ===== DATA LAYER ===== -->
  <!-- Auto refresh -->
  <rect x="80" y="140" width="150" height="45" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="155" y="159" text-anchor="middle" font-size="10" fill="#E65100">ONS data auto-refresh</text>
  <text x="155" y="173" text-anchor="middle" font-size="10" fill="#E65100">(monthly scheduled)</text>

  <!-- Dashboard -->
  <rect x="280" y="140" width="165" height="45" rx="4" fill="#EDE7F6" stroke="#5E35B1" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="362" y="159" text-anchor="middle" font-size="10" fill="#5E35B1">Power BI Dashboard</text>
  <text x="362" y="173" text-anchor="middle" font-size="10" fill="#5E35B1">updates automatically</text>

  <!-- Alerts -->
  <rect x="500" y="140" width="155" height="45" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="577" y="159" text-anchor="middle" font-size="10" fill="#E65100">Threshold alerts</text>
  <text x="577" y="173" text-anchor="middle" font-size="10" fill="#E65100">trigger notifications</text>

  <!-- Seasonal model -->
  <rect x="710" y="140" width="160" height="45" rx="4" fill="#EDE7F6" stroke="#5E35B1" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="790" y="159" text-anchor="middle" font-size="10" fill="#5E35B1">Seasonal model</text>
  <text x="790" y="173" text-anchor="middle" font-size="10" fill="#5E35B1">generates forecasts</text>

  <!-- Improvement tag -->
  <rect x="920" y="140" width="120" height="45" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="980" y="159" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Replaces</text>
  <text x="980" y="173" text-anchor="middle" font-size="10" fill="#2E7D32">ad-hoc IT requests</text>

  <!-- Data layer arrows -->
  <line x1="230" y1="162" x2="278" y2="162" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="445" y1="162" x2="498" y2="162" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="655" y1="162" x2="708" y2="162" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- ===== STORE MANAGER ROW ===== -->
  <rect x="80" y="248" width="130" height="45" rx="22" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="145" y="275" text-anchor="middle" font-size="11" fill="#2E7D32">Week Begins</text>

  <rect x="250" y="248" width="155" height="50" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="327" y="268" text-anchor="middle" font-size="10" fill="#1565C0">Check dashboard:</text>
  <text x="327" y="282" text-anchor="middle" font-size="10" fill="#1565C0">store vs. sector trend</text>

  <rect x="245" y="302" width="165" height="22" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="327" y="317" text-anchor="middle" font-size="9" fill="#2E7D32">Data replaces gut feeling</text>

  <!-- Decision: below target? -->
  <polygon points="530,273 595,248 660,273 595,298" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="595" y="271" text-anchor="middle" font-size="10" fill="#F57F17">Below</text>
  <text x="595" y="283" text-anchor="middle" font-size="10" fill="#F57F17">target?</text>

  <text x="670" y="268" font-size="10" fill="#C62828" font-weight="bold">Yes</text>
  <text x="595" y="315" font-size="10" fill="#4CAF50" font-weight="bold">No</text>

  <!-- On track path -->
  <rect x="540" y="320" width="115" height="35" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="597" y="342" text-anchor="middle" font-size="10" fill="#1565C0">Continue plan</text>

  <!-- Below target path -->
  <rect x="710" y="248" width="155" height="50" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="787" y="268" text-anchor="middle" font-size="10" fill="#1565C0">Review seasonal</text>
  <text x="787" y="282" text-anchor="middle" font-size="10" fill="#1565C0">forecast for next 4 wks</text>

  <!-- ===== AREA MANAGER ROW ===== -->
  <rect x="250" y="365" width="160" height="50" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="330" y="385" text-anchor="middle" font-size="10" fill="#1565C0">Compare stores on</text>
  <text x="330" y="399" text-anchor="middle" font-size="10" fill="#1565C0">dashboard (indexed view)</text>

  <rect x="245" y="419" width="170" height="22" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="330" y="434" text-anchor="middle" font-size="9" fill="#2E7D32">Replaces anecdotal review</text>

  <!-- Decision: Sector-wide or store-specific? -->
  <polygon points="550,390 625,365 700,390 625,415" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="625" y="386" text-anchor="middle" font-size="9" fill="#F57F17">Sector-wide</text>
  <text x="625" y="398" text-anchor="middle" font-size="9" fill="#F57F17">or local?</text>

  <text x="710" y="385" font-size="9" fill="#2E75B6" font-weight="bold">Sector</text>
  <text x="625" y="433" font-size="9" fill="#2E75B6" font-weight="bold">Local</text>

  <!-- Local: store-level action -->
  <rect x="560" y="440" width="140" height="40" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="630" y="460" text-anchor="middle" font-size="10" fill="#1565C0">Store-level rota adjust</text>
  <text x="630" y="472" text-anchor="middle" font-size="10" fill="#1565C0">(within local budget)</text>

  <!-- Sector: escalate to Head Office -->
  <rect x="750" y="365" width="155" height="50" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="827" y="385" text-anchor="middle" font-size="10" fill="#1565C0">Escalate with data:</text>
  <text x="827" y="399" text-anchor="middle" font-size="10" fill="#1565C0">decline rate + forecast</text>

  <!-- ===== HEAD OFFICE ROW ===== -->
  <rect x="180" y="475" width="170" height="50" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="265" y="495" text-anchor="middle" font-size="10" fill="#1565C0">Review sector trends</text>
  <text x="265" y="509" text-anchor="middle" font-size="10" fill="#1565C0">+ YoY comparisons</text>

  <polygon points="470,500 535,475 600,500 535,525" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="535" y="498" text-anchor="middle" font-size="9" fill="#F57F17">Strategic</text>
  <text x="535" y="510" text-anchor="middle" font-size="9" fill="#F57F17">change?</text>

  <text x="610" y="495" font-size="9" fill="#C62828" font-weight="bold">Yes</text>
  <text x="535" y="543" font-size="9" fill="#4CAF50" font-weight="bold">No</text>

  <!-- No: tactical adjustment -->
  <rect x="475" y="535" width="125" height="35" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5"/>
  <text x="537" y="557" text-anchor="middle" font-size="10" fill="#1565C0">Tactical adjustment</text>

  <!-- Yes: build business case -->
  <rect x="650" y="475" width="165" height="50" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="732" y="495" text-anchor="middle" font-size="10" fill="#1565C0">Build data-backed</text>
  <text x="732" y="509" text-anchor="middle" font-size="10" fill="#1565C0">business case</text>

  <rect x="645" y="529" width="175" height="22" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="732" y="544" text-anchor="middle" font-size="9" fill="#2E7D32">Evidence replaces intuition</text>

  <!-- ===== FINANCE ROW ===== -->
  <rect x="650" y="575" width="170" height="45" rx="4" fill="#E3F2FD" stroke="#2E75B6" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="735" y="594" text-anchor="middle" font-size="10" fill="#1565C0">Evaluate with footfall</text>
  <text x="735" y="608" text-anchor="middle" font-size="10" fill="#1565C0">ROI + decline projections</text>

  <rect x="645" y="624" width="180" height="22" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="735" y="639" text-anchor="middle" font-size="9" fill="#2E7D32">Replaces cost-only analysis</text>

  <!-- End -->
  <rect x="370" y="578" width="180" height="40" rx="20" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="460" y="596" text-anchor="middle" font-size="10" fill="#2E7D32">Data-Driven Decision</text>
  <text x="460" y="609" text-anchor="middle" font-size="10" fill="#2E7D32">Implemented &amp; Tracked</text>

  <!-- ===== ARROWS ===== -->
  <!-- Store manager flow -->
  <line x1="210" y1="270" x2="248" y2="270" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="405" y1="273" x2="530" y2="273" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="660" y1="273" x2="708" y2="273" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <!-- No path down -->
  <line x1="595" y1="298" x2="595" y2="318" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Dashboard feeds down to store mgr -->
  <line x1="362" y1="185" x2="362" y2="210" stroke="#5E35B1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="362" y1="210" x2="327" y2="210" stroke="#5E35B1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="327" y1="210" x2="327" y2="246" stroke="#5E35B1" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>

  <!-- Seasonal model feeds to store mgr -->
  <line x1="790" y1="185" x2="790" y2="220" stroke="#5E35B1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="790" y1="220" x2="787" y2="220" stroke="#5E35B1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="787" y1="220" x2="787" y2="246" stroke="#5E35B1" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>

  <!-- Store mgr down to area mgr -->
  <line x1="787" y1="298" x2="787" y2="340" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="787" y1="340" x2="330" y2="340" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="330" y1="340" x2="330" y2="363" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Area mgr to decision -->
  <line x1="410" y1="390" x2="550" y2="390" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Sector path -->
  <line x1="700" y1="390" x2="748" y2="390" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Local path down -->
  <line x1="625" y1="415" x2="625" y2="438" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Sector escalate to head office -->
  <line x1="827" y1="415" x2="827" y2="455" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="827" y1="455" x2="265" y2="455" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="265" y1="455" x2="265" y2="473" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Head office to decision -->
  <line x1="350" y1="500" x2="470" y2="500" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- No: tactical -->
  <line x1="535" y1="525" x2="535" y2="533" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Yes: business case -->
  <line x1="600" y1="500" x2="648" y2="500" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Business case to finance -->
  <line x1="732" y1="525" x2="732" y2="555" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="732" y1="555" x2="735" y2="555" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="735" y1="555" x2="735" y2="573" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Finance to end -->
  <line x1="650" y1="597" x2="552" y2="597" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Tactical to end -->
  <line x1="475" y1="552" x2="460" y2="552" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="460" y1="552" x2="460" y2="576" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Local adjust to end -->
  <line x1="560" y1="460" x2="460" y2="460" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="460" y1="460" x2="460" y2="576" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- ===== IMPROVEMENT SUMMARY ===== -->
  <rect x="30" y="660" width="1040" height="175" rx="8" fill="white" stroke="#2E7D32" stroke-width="2"/>
  <rect x="30" y="660" width="1040" height="35" rx="8" fill="#2E7D32"/>
  <rect x="30" y="680" width="1040" height="15" fill="#2E7D32"/>
  <text x="550" y="683" text-anchor="middle" fill="white" font-size="13" font-weight="bold">KEY IMPROVEMENTS IN FUTURE STATE</text>

  <circle cx="60" cy="720" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="60" y="724" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">1</text>
  <text x="80" y="724" font-size="11" fill="#333">Automated data pipeline — ONS data refreshes monthly with zero manual effort</text>

  <circle cx="60" cy="750" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="60" y="754" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">2</text>
  <text x="80" y="754" font-size="11" fill="#333">Dashboard-first decisions — every stakeholder starts with quantified trend data, not anecdote</text>

  <circle cx="60" cy="780" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="60" y="784" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">3</text>
  <text x="80" y="784" font-size="11" fill="#333">Seasonal forecasting — staffing and promotions are planned ahead based on historical patterns</text>

  <circle cx="60" cy="810" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="60" y="814" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">4</text>
  <text x="80" y="814" font-size="11" fill="#333">Footfall ROI framework — Finance evaluates store decisions using decline projections, not just cost</text>

  <!-- Footer -->
  <text x="550" y="845" text-anchor="middle" font-size="9" fill="#999">D3 — Process Flow Diagram (Future State) | BA Portfolio Project | March 2026</text>
</svg>
